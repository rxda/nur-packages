name: Build and cache packages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cachix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        package:
          - bilibili-video-downloader
          - sing-box-beta
          - tonghuashun

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: rxda-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Compute package hash
        id: package-hash
        run: |
          drv_path="$(nix eval --raw .#${{ matrix.package }}.drvPath)"
          drv_name="$(basename "$drv_path")"
          drv_hash="${drv_name%%-*}"

          echo "drv_path=$drv_path" >> "$GITHUB_OUTPUT"
          echo "drv_hash=$drv_hash" >> "$GITHUB_OUTPUT"
          echo "Package ${{ matrix.package }} derivation: $drv_path"

      - name: Restore build marker
        id: build-marker
        uses: actions/cache/restore@v4
        with:
          path: .build-markers/${{ matrix.package }}
          key: nix-build-${{ runner.os }}-${{ matrix.package }}-${{ steps.package-hash.outputs.drv_hash }}

      - name: Build package
        if: steps.build-marker.outputs.cache-hit != 'true'
        run: |
          nix build .#${{ matrix.package }} \
            --print-build-logs \
            --out-link result-${{ matrix.package }}
          cachix push rxda-cache result-${{ matrix.package }}

      - name: Record build marker
        if: steps.build-marker.outputs.cache-hit != 'true'
        run: |
          mkdir -p .build-markers/${{ matrix.package }}
          echo "${{ steps.package-hash.outputs.drv_path }}" > .build-markers/${{ matrix.package }}/drv-path
          echo "${{ steps.package-hash.outputs.drv_hash }}" > .build-markers/${{ matrix.package }}/drv-hash
          echo "${{ github.sha }}" > .build-markers/${{ matrix.package }}/commit

      - name: Save build marker
        if: steps.build-marker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .build-markers/${{ matrix.package }}
          key: nix-build-${{ runner.os }}-${{ matrix.package }}-${{ steps.package-hash.outputs.drv_hash }}

      - name: Skip unchanged package
        if: steps.build-marker.outputs.cache-hit == 'true'
        run: |
          echo "Skipping ${{ matrix.package }}: derivation hash ${{ steps.package-hash.outputs.drv_hash }} was already built."
